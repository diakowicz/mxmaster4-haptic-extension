<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
    }
    h2 { margin: 0 0 12px; font-size: 14px; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    label { font-size: 13px; }
    .status {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      background: #ccc;
    }
    .dot.ok { background: #22c55e; }
    .dot.err { background: #ef4444; }
  </style>
</head>
<body>
  <h2>MX Master 4 Haptics</h2>
  <div class="row">
    <label for="toggle">Enable</label>
    <input type="checkbox" id="toggle" checked>
  </div>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">Checking...</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
