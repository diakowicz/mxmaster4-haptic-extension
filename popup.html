<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #141414;
      color: #e8e8e8;
      width: 300px;
      padding-bottom: 12px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a2a;
    }
    .header svg { flex-shrink: 0; }
    .header-text h1 { font-size: 13px; font-weight: 600; color: #fff; }
    .header-text p  { font-size: 11px; color: #888; margin-top: 2px; }

    /* Status bar */
    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }
    .status-left { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #333;
      transition: background 0.3s;
    }
    .dot.ok  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.err { background: #ef4444; }

    /* Master toggle row */
    .master-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    .master-label { font-size: 13px; font-weight: 500; color: #fff; }

    /* Section label */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      padding: 10px 16px 4px;
    }

    /* Event row */
    .event-row {
      display: flex;
      align-items: center;
      padding: 7px 16px;
      gap: 10px;
      transition: background 0.15s;
    }
    .event-row:hover { background: #1e1e1e; }
    .event-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
    .event-name { font-size: 12px; color: #ccc; flex: 1; }
    .event-controls { display: flex; align-items: center; gap: 8px; }

    select {
      background: #2a2a2a;
      border: 1px solid #383838;
      border-radius: 5px;
      color: #ccc;
      font-size: 11px;
      padding: 3px 6px;
      cursor: pointer;
      outline: none;
      max-width: 110px;
    }
    select:focus { border-color: #00d4aa55; }
    select:disabled { opacity: 0.3; cursor: default; }

    /* Toggle switch */
    .toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #333; border-radius: 18px; cursor: pointer;
      transition: background 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; top: 3px;
      background: #777; border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: #00d4aa22; }
    input:checked + .slider:before { transform: translateX(14px); background: #00d4aa; }

    .divider { height: 1px; background: #2a2a2a; margin: 6px 0; }
  </style>
</head>
<body>

  <div class="header">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="8" fill="#00d4aa18"/>
      <path d="M18 6C13 6 10 10 10 15v8c0 3 2 5 5 5h6c3 0 5-2 5-5v-8c0-5-3-9-8-9z" fill="#00d4aa" opacity="0.9"/>
      <rect x="16" y="6" width="4" height="11" rx="2" fill="#141414" opacity="0.5"/>
      <line x1="10" y1="17" x2="26" y2="17" stroke="#141414" stroke-width="1.5" opacity="0.5"/>
      <circle cx="24" cy="11" r="3" fill="#00d4aa" opacity="0.6"/>
    </svg>
    <div class="header-text">
      <h1>MX Master 4 Haptics</h1>
      <p>Tactile feedback for every interaction</p>
    </div>
  </div>

  <div class="statusbar">
    <div class="status-left">
      <div class="dot" id="dot"></div>
      <span id="statusText">Checking...</span>
    </div>
  </div>

  <div class="master-row">
    <span class="master-label">Enable haptics</span>
    <label class="toggle">
      <input type="checkbox" id="masterToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="section-label">Hover</div>

  <div class="event-row" id="row-hoverLink">
    <span class="event-icon">🔗</span>
    <span class="event-name">Link</span>
    <div class="event-controls">
      <select id="wf-hoverLink"></select>
      <label class="toggle">
        <input type="checkbox" id="en-hoverLink">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="event-row" id="row-hoverButton">
    <span class="event-icon">🖱️</span>
    <span class="event-name">Button</span>
    <div class="event-controls">
      <select id="wf-hoverButton"></select>
      <label class="toggle">
        <input type="checkbox" id="en-hoverButton">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="event-row" id="row-hoverInput">
    <span class="event-icon">⌨️</span>
    <span class="event-name">Input field</span>
    <div class="event-controls">
      <select id="wf-hoverInput"></select>
      <label class="toggle">
        <input type="checkbox" id="en-hoverInput">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="divider"></div>
  <div class="section-label">Form</div>

  <div class="event-row">
    <span class="event-icon">🎯</span>
    <span class="event-name">Focus field</span>
    <div class="event-controls">
      <select id="wf-focus"></select>
      <label class="toggle">
        <input type="checkbox" id="en-focus">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="event-row">
    <span class="event-icon">✅</span>
    <span class="event-name">Submit</span>
    <div class="event-controls">
      <select id="wf-submit"></select>
      <label class="toggle">
        <input type="checkbox" id="en-submit">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="event-row">
    <span class="event-icon">⚠️</span>
    <span class="event-name">Validation error</span>
    <div class="event-controls">
      <select id="wf-formError"></select>
      <label class="toggle">
        <input type="checkbox" id="en-formError">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="divider"></div>
  <div class="section-label">Interactions</div>

  <div class="event-row">
    <span class="event-icon">🎚️</span>
    <span class="event-name">Slider</span>
    <div class="event-controls">
      <select id="wf-slider"></select>
      <label class="toggle">
        <input type="checkbox" id="en-slider">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="event-row">
    <span class="event-icon">✨</span>
    <span class="event-name">Animation end</span>
    <div class="event-controls">
      <select id="wf-animation"></select>
      <label class="toggle">
        <input type="checkbox" id="en-animation">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="divider"></div>
  <div class="section-label">Scroll</div>

  <div class="event-row">
    <span class="event-icon">📜</span>
    <span class="event-name">Edge of page</span>
    <div class="event-controls">
      <select id="wf-scrollEdge"></select>
      <label class="toggle">
        <input type="checkbox" id="en-scrollEdge">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
